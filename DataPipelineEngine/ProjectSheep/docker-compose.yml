version: '3.8'

services:
  web_app:
    build: .
    container_name: pipeline_web_app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/code
      - shared_data:/code/shared_storage
    environment:
      - MONGO_URI=mongodb://mongodb:27017/pipeline_db
      - REDIS_URI=redis://redis_broker:6379/0
    depends_on:
      - mongodb
      - redis_broker

  celery_worker:
    build: .
    container_name: pipeline_celery_worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - .:/code
      - shared_data:/code/shared_storage
    environment:
      - MONGO_URI=mongodb://mongodb:27017/pipeline_db
      - REDIS_URI=redis://redis_broker:6379/0
    depends_on:
      - redis_broker
      - mongodb

  redis_broker:
    image: redis:7.2-alpine
    container_name: pipeline_redis_broker
    ports:
      - "6373:6379"

  mongodb:
    image: mongo:7.0
    container_name: pipeline_mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
  shared_data:



